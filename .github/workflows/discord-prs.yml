name: Discord Pull Request Notifications

on:
  pull_request:
    types: [opened]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord notification
        run: |
          curl -H "Content-Type: application/json" \
          -d '{
            "content":"@everyone",
            "embeds":[
              {
                "title":"New Pull Request",
                "description":"**#${{ github.event.pull_request.number }}** - ${{ github.event.pull_request.title }}",
                "url":"${{ github.event.pull_request.html_url }}",
                "color":3447003,
                "fields":[
                  {
                    "name":"Author",
                    "value":"${{ github.event.pull_request.user.login }}",
                    "inline":true
                  },
                  {
                    "name":"Branch",
                    "value":"`${{ github.event.pull_request.head.ref }}` → `${{ github.event.pull_request.base.ref }}`",
                    "inline":true
                  }
                ],
                "footer":{
                  "text":"Pyrecall"
                },
                "timestamp":"${{ github.event.pull_request.created_at }}"
              }
            ]
          }' \
          ${{ secrets.DISCORD_ISSUES_WEBHOOK }}
